name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
