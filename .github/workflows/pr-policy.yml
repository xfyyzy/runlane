name: PR Policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  pr-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write PR body from event payload
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "${PR_BODY:-}" > "$RUNNER_TEMP/pr-body.md"
      - name: Check PR body policy
        run: scripts/ci/check-pr-policy.sh "$RUNNER_TEMP/pr-body.md"
